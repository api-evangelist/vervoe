meters:
- name: subscription
  description: Recurring subscription/enterprise fee for the Vervoe platform, inclusive of API access on eligible plans.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - plan
- name: candidate_volume
  description: Candidates assessed within the subscription period; the primary volume lever historically driving plan sizing.
  unit: candidates
  aggregation: sum
  dimensions:
  - account
  - assessment
- name: seats
  description: Team member seats included with the plan.
  unit: seats
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track candidate volume and seat usage against the subscription tier; API calls are not separately metered but reflect assessment and candidate activity.
- name: Allocation
  description: Attribute Vervoe spend to hiring teams or requisitions by tagging assessments and candidate cohorts to internal cost centers.
- name: Optimization
  description: Right-size the plan to actual candidate volume and seats; consolidate assessment usage; negotiate enterprise terms for high-volume, integrated (API/ATS) hiring.
- name: Accountability
  description: Assign an owner for the Vervoe relationship; review candidate volume against plan allowances and renewal terms each cycle.
