description: >-
  FinOps view of Vervoe spend. Vervoe is a SaaS skills-assessment and hiring
  platform sold on a subscription/enterprise basis rather than usage-metered
  API billing. There is no public per-call API price and no self-service
  pricing; cost is driven by the subscription plan, which is historically
  oriented around candidate volume and team seats. API access is bundled into
  the enterprise/partner relationship rather than sold as a metered API
  product, so the dominant cost lever is candidate volume and plan tier, not
  request count.
notes: >-
  Per-unit rates are not published; verify on the Vervoe pricing page and in
  the negotiated enterprise agreement. The API itself carries no separately
  published fee - it is provisioned as part of a plan. Treat meters below as a
  modeled framework for tracking spend, not published billing dimensions.
