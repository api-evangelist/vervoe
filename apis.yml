name: Vervoe
kind: company
description: Vervoe is an AI-powered skills assessment and skills-based hiring
  platform. Employers build their own assessment content or select from a public
  Assessment Library - assessments can include video, spreadsheets, presentations,
  and code challenges that simulate real work - then invite candidates and let
  Vervoe's AI grade and rank them by predicted on-the-job performance in "Talent
  Trials". The Vervoe API is a partner/integration REST API, accessed over HTTPS,
  that lets an external system (typically an ATS or internal hiring dashboard)
  list an employer's assessments, invite candidates to complete an assessment,
  retrieve candidate assessment reports and scores, and receive real-time report
  notifications through a signed webhook. API access is provisioned by Vervoe -
  partners contact sales to set up credentials. Detailed REST endpoint paths are
  not published in the public documentation, so the logical APIs below are modeled
  from Vervoe's documented Example Scenarios and webhook reference.
