apis:
- aid: vervoe:vervoe-assessments-api
  name: Vervoe Assessments API
  tags:
  - Assessments
  - Content
  - Skills
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
  baseURL: https://api.vervoe.com
  endpointsModeled: true
  properties:
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjQ4ODIx-introduction
    type: Documentation
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
    type: APIReference
  description: Retrieve the assessments available to an employer - both content
    the employer has authored and items selected from Vervoe's public Assessment
    Library - so an external system such as an ATS can display and organize them.
    Per Vervoe's documented Example Scenario 1, an integration calls the API to
    "get list of assessments"; exact REST endpoint paths are not published, so
    this operation is modeled from the documented scenario.
- aid: vervoe:vervoe-candidates-api
  name: Vervoe Candidates API
  tags:
  - Candidates
  - Invitations
  - Progress
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
  baseURL: https://api.vervoe.com
  endpointsModeled: true
  properties:
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjQ4ODIx-introduction
    type: Documentation
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
    type: APIReference
  description: Invite a candidate (email, first name, last name) to complete a
    specific assessment and monitor their progress. Per documented Example
    Scenario 2, the integration issues a "POST Invite candidate to complete
    assessment" call and receives back a candidate-specific URL to access the
    assessment, which the employer can email or embed in a button. Exact REST
    endpoint paths are not published, so this operation is modeled from the
    documented scenario.
- aid: vervoe:vervoe-reports-api
  name: Vervoe Candidate Reports API
  tags:
  - Reports
  - Results
  - Scores
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
  baseURL: https://api.vervoe.com
  endpointsModeled: true
  properties:
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjQ4ODIx-introduction
    type: Documentation
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODk-example-scenarios
    type: APIReference
  description: Retrieve a candidate's assessment results and scores so an external
    system can load and display them. Per documented Example Scenario 3, the
    integration issues a "GET Get candidate assessment report" call and Vervoe
    returns the result details, including AI and manual scores. Exact REST
    endpoint paths are not published, so this operation is modeled from the
    documented scenario.
- aid: vervoe:vervoe-report-notification-webhook
  name: Vervoe Report Notification Webhook
  tags:
  - Webhook
  - Notifications
  - Events
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODc-report-notification-web-hook
  baseURL: https://api.vervoe.com
  endpointsModeled: true
  properties:
  - url: https://vervoe.stoplight.io/docs/api-docs/ZG9jOjExMzY5ODc-report-notification-web-hook
    type: Documentation
  description: An employer can configure a reporting webhook to which Vervoe sends
    an Assessment Report. Fourteen documented events fire updates - including
    candidate started, candidate completed, first AI grade, AI score updated,
    first manual team score, manual score updated, hired, unhired, rejected,
    un-rejected, expired, screening in progress, failed screening, and passed
    screening. Payloads carry the candidateAssessmentUuid, status, timestamps,
    and a score object (type, score, scoreByFormat). Vervoe signs each delivery
    with an HMAC SHA-256 signature in a Vervoe-Signature header (t and hash);
    consumers must return HTTP 200 or Vervoe retries. This is a server-to-endpoint
    HTTP callback, not a WebSocket.
